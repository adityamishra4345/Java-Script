<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI CALCULATOR</title>
    <link rel="stylesheet" href="./bmi.css">
</head>
<body>
    <div class="sty">
    <form><div id="dw" class="row">
        <p>Enter your Weight :</p>
             <input type="number" id="weight" placeholder="Enter Your weight in KGs">
        </div>
        <br>
        <div id="dh" class="row">
            <p>Enter your Height :</p>
            <input type="number" id="height" placeholder="Enter Your height in cms">
        </div>
        <br>
        <button id="calculate" > Calculate BMI</button>
        <br><br>
        <div id="output">BMI :</div>

    </form>
    <script src="./bmi.js"></script>
    </div>
</body>
</html>
